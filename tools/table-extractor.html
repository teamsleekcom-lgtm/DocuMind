<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Extractor — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span class="breadcrumb-sep">›</span><span>Extract &amp;
                Analyze</span><span class="breadcrumb-sep">›</span><span>Table Extractor</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                    <line x1="3" y1="15" x2="21" y2="15" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                </svg></div>
            <div>
                <h1>Table Extractor</h1>
                <p>Detect grid-like text structures and export to CSV or JSON.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div class="options-panel" id="options" style="display:none;">
                <h3>Output</h3>
                <div class="option-row"><label class="option-label">Format</label>
                    <select id="fmt">
                        <option value="csv">CSV (all pages)</option>
                        <option value="json">JSON (all pages)</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Extract Tables</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>Tables Extracted</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="preview-area"></div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf.min.js"></script>
    <script src="../libs/xlsx.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            pdfjsLib.GlobalWorkerOptions.workerSrc = '../libs/pdf.worker.min.js';
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: function (files) { if (files.length) { currentFile = files[0]; document.getElementById('options').style.display = 'block'; btnProcess.disabled = false; } }
            });
            function extractGrid(items) {
                const rows = {};
                items.forEach(function (item) {
                    const y = Math.round(item.transform[5] / 4) * 4;
                    if (!rows[y]) rows[y] = [];
                    rows[y].push({ text: item.str.trim(), x: item.transform[4] });
                });
                return Object.keys(rows).sort(function (a, b) { return b - a; }).map(function (y) {
                    return rows[y].sort(function (a, b) { return a.x - b.x; }).map(function (c) { return c.text; }).filter(function (t) { return t; });
                }).filter(function (r) { return r.length > 1; });
            }
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(5, 'Loading...');
                    const data = new Uint8Array(await currentFile.arrayBuffer());
                    const pdf = await pdfjsLib.getDocument({ data }).promise;
                    const allTables = [];
                    for (let i = 1; i <= pdf.numPages; i++) {
                        progress.update(5 + (i / pdf.numPages) * 80, 'Processing page ' + i + '...');
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const grid = extractGrid(content.items);
                        if (grid.length) allTables.push({ page: i, rows: grid });
                    }
                    const fmt = document.getElementById('fmt').value;
                    let blob, fname;
                    const preview = document.getElementById('preview-area'); preview.innerHTML = '';
                    allTables.slice(0, 3).forEach(function (tbl) {
                        const h = document.createElement('p'); h.style.fontWeight = '600'; h.style.fontSize = '0.8125rem'; h.style.marginTop = '1rem'; h.textContent = 'Page ' + tbl.page;
                        const table = document.createElement('table'); table.className = 'metadata-table'; table.style.marginBottom = '0.5rem';
                        tbl.rows.forEach(function (row) {
                            const tr = document.createElement('tr');
                            row.forEach(function (cell) { const td = document.createElement('td'); td.textContent = cell; tr.appendChild(td); });
                            table.appendChild(tr);
                        });
                        preview.appendChild(h); preview.appendChild(table);
                    });
                    if (fmt === 'json') {
                        blob = new Blob([JSON.stringify(allTables, null, 2)], { type: 'application/json' }); fname = 'tables.json';
                    } else {
                        const lines = []; allTables.forEach(function (t) { lines.push('# Page ' + t.page); t.rows.forEach(function (r) { lines.push(r.map(function (c) { return '"' + c + '"'; }).join(',')); }); lines.push(''); });
                        blob = new Blob([lines.join('\n')], { type: 'text/csv' }); fname = 'tables.csv';
                    }
                    progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = allTables.length + ' tables across ' + pdf.numPages + ' pages';
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, fname, da);
                    showToast('Tables extracted!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
