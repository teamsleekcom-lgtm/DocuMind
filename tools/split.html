<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Split a PDF into multiple files by page range, every N pages, or by bookmarks.">
    <title>Split PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>

                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank" rel="noopener"><svg
                    viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z" />
                </svg>GitHub</a></div>
    </nav>

    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Organize</span><span class="breadcrumb-sep">›</span><span>Split
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 3h-5v18h5" />
                    <path d="M8 3H3v18h5" />
                    <path d="M21 3v18" />
                </svg></div>
            <div>
                <h1>Split PDF</h1>
                <p>Split a PDF into multiple files by page range or every N pages.</p>
            </div>
        </div>

        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div id="file-info" style="display:none;" class="options-panel">
                <p id="page-count-info" style="font-size:0.8125rem; margin-bottom:1rem;"></p>
                <div class="tab-bar">
                    <button class="tab-btn active" data-tab="range">By Page Range</button>
                    <button class="tab-btn" data-tab="every">Every N Pages</button>
                </div>
                <div class="tab-content active" id="tab-range">
                    <div class="option-row"><label class="option-label">Page ranges</label><input type="text"
                            id="input-ranges" placeholder="e.g. 1-3, 5, 7-9"></div>
                </div>
                <div class="tab-content" id="tab-every">
                    <div class="option-row"><label class="option-label">Pages per file</label><input type="number"
                            id="input-every" value="1" min="1"></div>
                </div>
            </div>

            <button class="btn btn-primary" id="btn-process" disabled>Split PDF</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>Split Complete</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
            <div class="footer-links"><a href="https://github.com" target="_blank" rel="noopener">GitHub</a><a
                    href="../LICENSES.md">Licenses</a></div>
        </div>
    </footer>

    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../libs/pdf.min.js"></script>
    <script src="../libs/jszip.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            let totalPages = 0;
            let activeTab = 'range';

            const dropzoneArea = document.getElementById('dropzone-area');
            const fileInfo = document.getElementById('file-info');
            const pageCountInfo = document.getElementById('page-count-info');
            const btnProcess = document.getElementById('btn-process');
            const progressArea = document.getElementById('progress-area');
            const resultsArea = document.getElementById('results-area');
            const downloadArea = document.getElementById('download-area');
            const progress = createProgressBar(progressArea);

            document.querySelectorAll('.tab-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                    document.querySelectorAll('.tab-content').forEach(function (c) { c.classList.remove('active'); });
                    btn.classList.add('active');
                    activeTab = btn.dataset.tab;
                    document.getElementById('tab-' + activeTab).classList.add('active');
                });
            });

            createDropzone({
                container: dropzoneArea,
                accept: '.pdf',
                multiple: false,
                label: 'Drop a single PDF file',
                onFiles: async function (files) {
                    if (files.length === 0) return;
                    currentFile = files[0];
                    try {
                        totalPages = await getPageCount(currentFile);
                        pageCountInfo.textContent = currentFile.name + ' — ' + totalPages + ' pages • ' + formatFileSize(currentFile.size);
                        fileInfo.style.display = 'block';
                        btnProcess.disabled = false;
                    } catch (e) {
                        showToast('Error reading PDF: ' + e.message, 'error');
                    }
                }
            });

            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true;
                    progress.show();
                    progress.update(10, 'Loading PDF...');
                    const bytes = new Uint8Array(await currentFile.arrayBuffer());
                    const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
                    const zip = new JSZip();
                    let ranges = [];

                    if (activeTab === 'range') {
                        const input = document.getElementById('input-ranges').value;
                        const parts = input.split(',').map(function (s) { return s.trim(); });
                        parts.forEach(function (part) {
                            if (part.includes('-')) {
                                const ab = part.split('-');
                                ranges.push([parseInt(ab[0]), parseInt(ab[1])]);
                            } else {
                                const n = parseInt(part);
                                ranges.push([n, n]);
                            }
                        });
                    } else {
                        const n = parseInt(document.getElementById('input-every').value) || 1;
                        for (let i = 0; i < totalPages; i += n) {
                            ranges.push([i + 1, Math.min(i + n, totalPages)]);
                        }
                    }

                    for (let i = 0; i < ranges.length; i++) {
                        progress.update(10 + (i / ranges.length) * 80, 'Creating part ' + (i + 1) + '...');
                        const doc = await PDFLib.PDFDocument.create();
                        const indices = [];
                        for (let p = ranges[i][0] - 1; p < ranges[i][1] && p < totalPages; p++) {
                            indices.push(p);
                        }
                        const pages = await doc.copyPages(src, indices);
                        pages.forEach(function (pg) { doc.addPage(pg); });
                        const pdfBytes = await doc.save();
                        zip.file('split_' + (i + 1) + '.pdf', pdfBytes);
                    }

                    progress.update(95, 'Creating ZIP...');
                    const blob = await zip.generateAsync({ type: 'blob' });
                    progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = ranges.length + ' files created • ' + formatFileSize(blob.size);
                    resultsArea.classList.add('active');
                    downloadArea.innerHTML = '';
                    createDownloadButton(blob, 'split_pdfs.zip', downloadArea);
                    showToast('PDF split successfully!', 'success');
                } catch (err) {
                    showToast('Error: ' + err.message, 'error');
                } finally {
                    progress.hide();
                    btnProcess.disabled = false;
                }
            });
        })();
    </script>
</body>

</html>
