<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>Word to
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <path d="M8 13l2 4 2-4 2 4 2-4" />
                </svg></div>
            <div>
                <h1>Word to PDF</h1>
                <p>Convert DOCX files to PDF format via mammoth.js.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <button class="btn btn-primary" id="btn-process" disabled>Convert to PDF</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PDF Ready</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/mammoth.min.js"></script>
    <script src="../libs/jspdf.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.docx', multiple: false, label: 'Accepts .docx files',
                onFiles: function (files) { if (files.length) { currentFile = files[0]; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(20, 'Reading DOCX...');
                    const ab = await currentFile.arrayBuffer();
                    const result = await mammoth.convertToHtml({ arrayBuffer: ab });
                    progress.update(50, 'Rendering PDF...');
                    const { jsPDF } = jspdf;
                    const doc = new jsPDF({ format: 'a4', unit: 'mm' });
                    const tmp = document.createElement('div');
                    tmp.innerHTML = result.value;
                    tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:190mm;font-family:sans-serif;font-size:11px;line-height:1.5;padding:10mm;';
                    document.body.appendChild(tmp);
                    await doc.html(tmp, { x: 10, y: 10, html2canvas: { scale: 1.5 } });
                    document.body.removeChild(tmp);
                    progress.update(90, 'Saving...'); const blob = doc.output('blob'); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, currentFile.name.replace('.docx', '.pdf'), da);
                    showToast('Converted to PDF!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
