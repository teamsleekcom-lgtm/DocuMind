<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPTX to PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>PPTX to
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg></div>
            <div>
                <h1>PPTX to PDF</h1>
                <p>Convert PowerPoint slides to a PDF document (best-effort text extraction).</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <button class="btn btn-primary" id="btn-process" disabled>Convert to PDF</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PDF Ready</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/jszip.min.js"></script>
    <script src="../libs/jspdf.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pptx', multiple: false, label: 'Accepts .pptx',
                onFiles: function (files) { if (files.length) { currentFile = files[0]; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(10, 'Reading PPTX...');
                    const zip = await JSZip.loadAsync(currentFile);
                    const { jsPDF } = jspdf;
                    const doc = new jsPDF({ format: 'a4', orientation: 'landscape', unit: 'mm' });
                    const slideFiles = Object.keys(zip.files)
                        .filter(function (n) { return n.match(/ppt\/slides\/slide\d+\.xml$/); })
                        .sort(function (a, b) {
                            const na = parseInt(a.match(/\d+/)[0]); const nb = parseInt(b.match(/\d+/)[0]); return na - nb;
                        });
                    for (let i = 0; i < slideFiles.length; i++) {
                        progress.update(10 + (i / slideFiles.length) * 80, 'Processing slide ' + (i + 1) + '...');
                        if (i > 0) doc.addPage();
                        const xml = await zip.files[slideFiles[i]].async('text');
                        const text = xml.replace(/<a:t[^>]*>([^<]*)<\/a:t>/g, '$1 ').replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim().substring(0, 1000);
                        doc.setFontSize(14); doc.text('Slide ' + (i + 1), 15, 20);
                        doc.setFontSize(10);
                        const lines = doc.splitTextToSize(text, 267);
                        doc.text(lines.slice(0, 30), 15, 32);
                    }
                    const blob = doc.output('blob'); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = slideFiles.length + ' slides • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, currentFile.name.replace('.pptx', '.pdf'), da);
                    showToast('Converted to PDF!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
