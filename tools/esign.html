<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sign PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
    <style>
        #sig-canvas {
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            cursor: crosshair;
            touch-action: none;
        }

        .sig-type-input {
            font-size: 2rem;
            font-family: Georgia, serif;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 0.5rem 1rem;
            width: 100%;
        }

        .placement-area {
            position: relative;
            display: inline-block;
        }

        .sig-widget {
            position: absolute;
            border: 2px dashed var(--color-accent);
            cursor: move;
            padding: 4px;
            background: rgba(255, 255, 255, 0.8);
            user-select: none;
        }
    </style>
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Enrich</span><span
                class="breadcrumb-sep">›</span><span>E-Sign</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z" />
                </svg></div>
            <div>
                <h1>E-Sign PDF</h1>
                <p>Draw, type, or upload your signature and place it on the PDF.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div id="sig-area" style="display:none;">
                <div class="options-panel">
                    <h3>Create Signature</h3>
                    <div class="tab-bar">
                        <button class="tab-btn active" data-tab="draw">Draw</button>
                        <button class="tab-btn" data-tab="type">Type</button>
                    </div>
                    <div class="tab-content active" id="tab-draw">
                        <canvas id="sig-canvas" width="500" height="150"></canvas>
                        <div style="margin-top:0.5rem;display:flex;gap:0.5rem;">
                            <button class="btn btn-secondary" id="btn-clear-sig">Clear</button>
                        </div>
                    </div>
                    <div class="tab-content" id="tab-type">
                        <input type="text" class="sig-type-input" id="sig-text" placeholder="Type your name">
                    </div>
                </div>
                <div class="options-panel" style="margin-top:1rem;">
                    <h3>Placement</h3>
                    <div class="option-row"><label class="option-label">Page</label><input type="number" id="sig-page"
                            value="1" min="1"></div>
                    <div class="option-row"><label class="option-label">X position</label><input type="number"
                            id="sig-x" value="100" min="0"></div>
                    <div class="option-row"><label class="option-label">Y position</label><input type="number"
                            id="sig-y" value="100" min="0"></div>
                    <div class="option-row"><label class="option-label">Width</label><input type="number" id="sig-w"
                            value="150" min="20"></div>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Apply Signature</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>Signature Applied</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null, isDrawing = false, activeTab = 'draw';
            const canvas = document.getElementById('sig-canvas');
            const ctx = canvas.getContext('2d');
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            ctx.strokeStyle = '#0f0f0f'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

            document.querySelectorAll('.tab-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                    document.querySelectorAll('.tab-content').forEach(function (c) { c.classList.remove('active'); });
                    btn.classList.add('active'); activeTab = btn.dataset.tab;
                    document.getElementById('tab-' + activeTab).classList.add('active');
                });
            });

            function getPos(e) {
                const r = canvas.getBoundingClientRect();
                const ratio = canvas.width / r.width;
                const src = e.touches ? e.touches[0] : e;
                return { x: (src.clientX - r.left) * ratio, y: (src.clientY - r.top) * ratio };
            }
            canvas.addEventListener('mousedown', function (e) { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
            canvas.addEventListener('mousemove', function (e) { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
            canvas.addEventListener('mouseup', function () { isDrawing = false; });
            canvas.addEventListener('touchstart', function (e) { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
            canvas.addEventListener('touchmove', function (e) { e.preventDefault(); if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
            canvas.addEventListener('touchend', function () { isDrawing = false; });
            document.getElementById('btn-clear-sig').addEventListener('click', function () { ctx.clearRect(0, 0, canvas.width, canvas.height); });

            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: function (files) { if (files.length) { currentFile = files[0]; document.getElementById('sig-area').style.display = 'block'; btnProcess.disabled = false; } }
            });

            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(20, 'Embedding signature...');
                    const doc = await loadPDF(currentFile);
                    const pages = doc.getPages();
                    const pageNum = Math.min(Math.max(1, parseInt(document.getElementById('sig-page').value)), doc.getPageCount());
                    const page = pages[pageNum - 1];
                    const { height } = page.getSize();
                    const sigX = parseInt(document.getElementById('sig-x').value);
                    const sigY = parseInt(document.getElementById('sig-y').value);
                    const sigW = parseInt(document.getElementById('sig-w').value);

                    if (activeTab === 'draw') {
                        const dataUrl = canvas.toDataURL('image/png');
                        const resp = await fetch(dataUrl);
                        const imgBytes = new Uint8Array(await resp.arrayBuffer());
                        const img = await doc.embedPng(imgBytes);
                        const scale = sigW / img.width;
                        page.drawImage(img, { x: sigX, y: height - sigY - img.height * scale, width: sigW, height: img.height * scale });
                    } else {
                        const text = document.getElementById('sig-text').value || 'Signed';
                        const font = await doc.embedFont(PDFLib.StandardFonts.TimesRomanItalic);
                        page.drawText(text, { x: sigX, y: height - sigY, size: 28, font, color: PDFLib.rgb(0.05, 0.05, 0.5) });
                    }

                    progress.update(80, 'Saving...'); const blob = await savePDF(doc); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = 'Signature on page ' + pageNum + ' • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'signed.pdf', da);
                    showToast('Signature applied!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
