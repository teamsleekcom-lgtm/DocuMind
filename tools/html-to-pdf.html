<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML to PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>HTML to
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polyline points="16 18 22 12 16 6" />
                    <polyline points="8 6 2 12 8 18" />
                </svg></div>
            <div>
                <h1>HTML to PDF</h1>
                <p>Convert HTML content into a PDF document.</p>
            </div>
        </div>
        <div class="tool-main">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="paste">Paste HTML</button>
                <button class="tab-btn" data-tab="file">Upload .html File</button>
            </div>
            <div class="tab-content active" id="tab-paste">
                <textarea class="text-output" id="html-input" placeholder="Paste HTML here..."
                    style="min-height:200px;"></textarea>
            </div>
            <div class="tab-content" id="tab-file">
                <div id="dropzone-area"></div>
            </div>
            <div class="options-panel">
                <h3>Options</h3>
                <div class="option-row"><label class="option-label">Page Size</label>
                    <select id="page-size">
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process">Convert to PDF</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PDF Ready</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/jspdf.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let activeTab = 'paste', fileContent = '';
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));

            document.querySelectorAll('.tab-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
                    document.querySelectorAll('.tab-content').forEach(function (c) { c.classList.remove('active'); });
                    btn.classList.add('active'); activeTab = btn.dataset.tab;
                    document.getElementById('tab-' + activeTab).classList.add('active');
                });
            });

            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.html,.htm', multiple: false,
                onFiles: async function (files) {
                    if (files.length) { fileContent = await readFileAsText(files[0]); }
                }
            });

            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(20, 'Rendering HTML...');
                    const html = activeTab === 'paste' ? document.getElementById('html-input').value : fileContent;
                    if (!html.trim()) return showToast('Please provide HTML content', 'error');
                    const ps = document.getElementById('page-size').value;
                    const { jsPDF } = jspdf;
                    const doc = new jsPDF({ format: ps === 'letter' ? 'letter' : 'a4', unit: 'mm' });
                    const tmp = document.createElement('div');
                    tmp.innerHTML = html;
                    tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:190mm;font-family:sans-serif;font-size:11px;line-height:1.5;padding:10mm;';
                    document.body.appendChild(tmp);
                    progress.update(50, 'Generating PDF...');
                    await doc.html(tmp, { x: 10, y: 10, html2canvas: { scale: 1.5 } });
                    document.body.removeChild(tmp);
                    progress.update(90, 'Saving...'); const blob = doc.output('blob'); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'document.pdf', da);
                    showToast('PDF created!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
