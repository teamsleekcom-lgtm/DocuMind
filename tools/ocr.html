<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span class="breadcrumb-sep">›</span><span>Extract &amp;
                Analyze</span><span class="breadcrumb-sep">›</span><span>OCR</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M7 8h4" />
                    <path d="M7 12h10" />
                    <path d="M7 16h6" />
                </svg></div>
            <div>
                <h1>OCR</h1>
                <p>Extract text from scanned PDFs and images using Tesseract.js.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div class="options-panel" id="options" style="display:none;">
                <h3>Language</h3>
                <div class="option-row"><label class="option-label">Language</label>
                    <select id="lang">
                        <option value="eng">English</option>
                        <option value="deu">German</option>
                        <option value="fra">French</option>
                        <option value="spa">Spanish</option>
                        <option value="ita">Italian</option>
                        <option value="por">Portuguese</option>
                        <option value="chi_sim">Chinese (Simplified)</option>
                        <option value="jpn">Japanese</option>
                        <option value="hin">Hindi</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Run OCR</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>OCR Complete</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div class="output-area">
                    <textarea class="text-output" id="ocr-out" readonly></textarea>
                    <div class="output-actions">
                        <button class="btn btn-secondary" id="btn-copy">Copy</button>
                        <div id="download-area"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf.min.js"></script>
    <script src="../libs/tesseract.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            pdfjsLib.GlobalWorkerOptions.workerSrc = '../libs/pdf.worker.min.js';
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf,.png,.jpg,.jpeg,.webp,.tiff', multiple: false, label: 'Accepts PDF or image files',
                onFiles: function (files) { if (files.length) { currentFile = files[0]; document.getElementById('options').style.display = 'block'; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(5, 'Initializing OCR engine...');
                    const lang = document.getElementById('lang').value;
                    const worker = await Tesseract.createWorker(lang, 1, {
                        logger: function (m) { if (m.status === 'recognizing text') progress.update(20 + m.progress * 70, 'Recognizing text...'); }
                    });
                    let text = '';
                    const isPdf = currentFile.type === 'application/pdf' || currentFile.name.endsWith('.pdf');
                    if (isPdf) {
                        const data = new Uint8Array(await currentFile.arrayBuffer());
                        const pdf = await pdfjsLib.getDocument({ data }).promise;
                        for (let i = 1; i <= pdf.numPages; i++) {
                            progress.update(10 + (i / pdf.numPages) * 10, 'Rendering page ' + i + '...');
                            const page = await pdf.getPage(i);
                            const vp = page.getViewport({ scale: 2 });
                            const canvas = document.createElement('canvas');
                            canvas.width = vp.width; canvas.height = vp.height;
                            await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                            const result = await worker.recognize(canvas);
                            text += '--- Page ' + i + ' ---\n' + result.data.text + '\n\n';
                        }
                    } else {
                        const result = await worker.recognize(currentFile);
                        text = result.data.text;
                    }
                    await worker.terminate();
                    progress.update(100, 'Done!');
                    document.getElementById('ocr-out').value = text;
                    document.getElementById('results-info').textContent = text.length.toLocaleString() + ' characters extracted';
                    document.getElementById('results-area').classList.add('active');
                    const blob = new Blob([text], { type: 'text/plain' });
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'ocr-result.txt', da);
                    showToast('OCR complete!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
            document.getElementById('btn-copy').addEventListener('click', function () {
                navigator.clipboard.writeText(document.getElementById('ocr-out').value).then(function () { showToast('Copied!', 'success'); });
            });
        })();
    </script>
</body>

</html>
