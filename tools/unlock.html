<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Security</span><span class="breadcrumb-sep">›</span><span>Unlock
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 9.9-1" />
                </svg></div>
            <div>
                <h1>Unlock PDF</h1>
                <p>Remove password protection from a PDF file.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div class="options-panel" id="options" style="display:none;">
                <h3>Password</h3>
                <div class="option-row"><label class="option-label">Password</label><input type="password" id="pw"
                        placeholder="Enter the PDF password"></div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Remove Password</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PDF Unlocked</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: function (files) { if (files.length) { currentFile = files[0]; document.getElementById('options').style.display = 'block'; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(30, 'Unlocking...');
                    const bytes = new Uint8Array(await currentFile.arrayBuffer());
                    const pw = document.getElementById('pw').value;
                    const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true, password: pw });
                    progress.update(80, 'Saving unlocked PDF...');
                    const blob = await savePDF(doc); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = 'Password removed • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'unlocked.pdf', da);
                    showToast('PDF unlocked!', 'success');
                } catch (e) { showToast('Error: ' + e.message + ' — check password', 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
