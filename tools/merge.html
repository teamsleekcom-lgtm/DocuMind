    <div class="tool-page">
        <div class="breadcrumb">
            <a href="../index.html">Home</a>
            <span class="breadcrumb-sep">›</span>
            <span>Organize</span>
            <span class="breadcrumb-sep">›</span>
            <span>Merge PDFs</span>
        </div>

        <div class="tool-header">
            <div class="tool-header-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8z" />
                    <path d="M12 11v6" />
                    <path d="M9 14h6" />
                </svg>
            </div>
            <div>
                <h1>Merge PDFs</h1>
                <p>Combine multiple PDF files into a single document. Drag to reorder.</p>
            </div>
        </div>

        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div id="file-list-area"></div>

            <button class="btn btn-primary" id="btn-process" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 11v6" />
                    <path d="M9 14h6" />
                </svg>
                Merge PDFs
            </button>

            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                    </div>
                    <div class="results-text">
                        <h3>Merge Complete</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
            <div class="footer-links">
                <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
                <a href="../LICENSES.md">Licenses</a>
            </div>
        </div>

    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../libs/pdf.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            const files = [];
            const dropzoneArea = document.getElementById('dropzone-area');
            const fileListArea = document.getElementById('file-list-area');
            const btnProcess = document.getElementById('btn-process');
            const progressArea = document.getElementById('progress-area');
            const resultsArea = document.getElementById('results-area');
            const resultsInfo = document.getElementById('results-info');
            const downloadArea = document.getElementById('download-area');

            const progress = createProgressBar(progressArea);

            const dropzone = createDropzone({
                container: dropzoneArea,
                accept: '.pdf',
                multiple: true,
                label: 'Accepts PDF files only',
                onFiles: function (newFiles) {
                    files.length = 0;
                    files.push(...newFiles);
                    renderFileList();
                    btnProcess.disabled = files.length < 2;
                }
            });

            function renderFileList() {
                createFileList(fileListArea, files, {
                    removable: true,
                    sortable: true,
                    onRemove: function (index) {
                        files.splice(index, 1);
                        renderFileList();
                        btnProcess.disabled = files.length < 2;
                    },
                    onReorder: function (from, to) {
                        const item = files.splice(from, 1)[0];
                        files.splice(to, 0, item);
                        renderFileList();
                    }
                });
            }

            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true;
                    progress.show();
                    progress.update(10, 'Loading PDFs...');

                    const merged = await PDFLib.PDFDocument.create();

                    for (let i = 0; i < files.length; i++) {
                        progress.update(10 + (i / files.length) * 80, 'Merging file ' + (i + 1) + ' of ' + files.length + '...');
                        const bytes = new Uint8Array(await files[i].arrayBuffer());
                        const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
                        const pages = await merged.copyPages(src, src.getPageIndices());
                        pages.forEach(function (p) { merged.addPage(p); });
                    }

                    progress.update(95, 'Saving merged PDF...');
                    const blob = await savePDF(merged);

                    progress.update(100, 'Done!');
                    resultsInfo.textContent = files.length + ' files merged • ' + formatFileSize(blob.size);
                    resultsArea.classList.add('active');
                    downloadArea.innerHTML = '';
                    createDownloadButton(blob, 'merged.pdf', downloadArea);
                    showToast('PDFs merged successfully!', 'success');
                } catch (err) {
                    showToast('Error: ' + err.message, 'error');
                    logger.error(err);
                } finally {
                    progress.hide();
                    btnProcess.disabled = files.length < 2;
                }
            });

            // Auto-run support
            if (isAutorun() && files.length >= 2) {
                btnProcess.click();
            }
        })();
    </script>

</body>

</html>
