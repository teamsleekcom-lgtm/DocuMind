<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metadata Editor — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span class="breadcrumb-sep">›</span><span>Extract &amp;
                Analyze</span><span class="breadcrumb-sep">›</span><span>Metadata Editor</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="12" cy="12" r="3" />
                </svg></div>
            <div>
                <h1>Metadata Editor</h1>
                <p>View and edit PDF title, author, subject, and other properties.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div class="options-panel" id="meta-editor" style="display:none;">
                <h3>PDF Metadata</h3>
                <div class="option-row"><label class="option-label">Title</label><input type="text" id="m-title"></div>
                <div class="option-row"><label class="option-label">Author</label><input type="text" id="m-author">
                </div>
                <div class="option-row"><label class="option-label">Subject</label><input type="text" id="m-subject">
                </div>
                <div class="option-row"><label class="option-label">Keywords</label><input type="text" id="m-keywords">
                </div>
                <div class="option-row"><label class="option-label">Creator</label><input type="text" id="m-creator">
                </div>
                <div class="option-row"><label class="option-label">Producer</label><input type="text" id="m-producer"
                        readonly style="background:var(--color-surface-raised); color:var(--color-text-muted)"></div>
            </div>
            <table class="metadata-table" id="info-table" style="display:none;"></table>
            <button class="btn btn-primary" id="btn-process" disabled style="margin-top:1rem;">Save Metadata</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>Metadata Saved</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: async function (files) {
                    if (!files.length) return;
                    currentFile = files[0];
                    const bytes = new Uint8Array(await currentFile.arrayBuffer());
                    const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
                    document.getElementById('m-title').value = doc.getTitle() || '';
                    document.getElementById('m-author').value = doc.getAuthor() || '';
                    document.getElementById('m-subject').value = doc.getSubject() || '';
                    document.getElementById('m-keywords').value = doc.getKeywords() || '';
                    document.getElementById('m-creator').value = doc.getCreator() || '';
                    document.getElementById('m-producer').value = doc.getProducer() || '';
                    const tbl = document.getElementById('info-table');
                    const extra = [
                        ['Pages', doc.getPageCount()], ['Creation Date', doc.getCreationDate() || '—'], ['Modified Date', doc.getModificationDate() || '—'],
                        ['File Size', formatFileSize(currentFile.size)]
                    ];
                    tbl.innerHTML = extra.map(function (r) { return '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td></tr>'; }).join('');
                    tbl.style.display = 'table';
                    document.getElementById('meta-editor').style.display = 'block';
                    btnProcess.disabled = false;
                }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(30, 'Updating metadata...');
                    const bytes = new Uint8Array(await currentFile.arrayBuffer());
                    const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
                    doc.setTitle(document.getElementById('m-title').value);
                    doc.setAuthor(document.getElementById('m-author').value);
                    doc.setSubject(document.getElementById('m-subject').value);
                    doc.setKeywords([document.getElementById('m-keywords').value]);
                    doc.setCreator(document.getElementById('m-creator').value);
                    progress.update(80, 'Saving...'); const blob = await savePDF(doc); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'updated.pdf', da);
                    showToast('Metadata saved!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
