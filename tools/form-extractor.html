<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Extractor — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span class="breadcrumb-sep">›</span><span>Extract &amp;
                Analyze</span><span class="breadcrumb-sep">›</span><span>Form Extractor</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M9 9h6" />
                    <path d="M9 13h6" />
                    <path d="M9 17h4" />
                </svg></div>
            <div>
                <h1>Form Extractor</h1>
                <p>Extract PDF form field names and values to CSV or JSON.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div class="options-panel" id="options" style="display:none;">
                <h3>Output Format</h3>
                <div class="option-row"><label class="option-label">Format</label>
                    <select id="fmt">
                        <option value="csv">CSV</option>
                        <option value="json">JSON</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Extract Fields</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>Fields Extracted</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <table class="metadata-table" id="fields-table"></table>
                <div style="margin-top:0.75rem;">
                    <div id="download-area"></div>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: async function (files) { if (files.length) { currentFile = files[0]; document.getElementById('options').style.display = 'block'; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(30, 'Extracting form fields...');
                    const bytes = new Uint8Array(await currentFile.arrayBuffer());
                    const doc = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
                    const form = doc.getForm();
                    const fields = form.getFields();
                    const data = fields.map(function (f) {
                        let val = '';
                        try {
                            if (f.constructor.name.includes('Text')) val = f.getText() || '';
                            else if (f.constructor.name.includes('CheckBox')) val = f.isChecked() ? 'true' : 'false';
                            else if (f.constructor.name.includes('RadioGroup')) val = f.getSelected() || '';
                            else if (f.constructor.name.includes('DropDown')) val = (f.getSelected() || []).join(', ');
                        } catch (e) { }
                        return { field: f.getName(), type: f.constructor.name.replace('PDFField', ''), value: val };
                    });
                    progress.update(80, 'Formatting...');
                    const fmt = document.getElementById('fmt').value;
                    const tbl = document.getElementById('fields-table');
                    tbl.innerHTML = '<tr><th>Field</th><th>Type</th><th>Value</th></tr>' + data.map(function (r) {
                        return '<tr><td>' + r.field + '</td><td>' + r.type + '</td><td>' + (r.value || '—') + '</td></tr>';
                    }).join('');
                    let blob, fname;
                    if (fmt === 'json') {
                        blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                        fname = 'fields.json';
                    } else {
                        const csv = 'Field,Type,Value\n' + data.map(function (r) { return '"' + r.field + '","' + r.type + '","' + r.value + '"'; }).join('\n');
                        blob = new Blob([csv], { type: 'text/csv' });
                        fname = 'fields.csv';
                    }
                    progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = data.length + ' fields extracted';
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, fname, da);
                    showToast(data.length + ' fields extracted!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
