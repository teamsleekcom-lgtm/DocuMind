<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images to PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>Images to
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M12 8v8" />
                    <path d="M8 12h8" />
                </svg></div>
            <div>
                <h1>Images to PDF</h1>
                <p>Combine JPEG, PNG, WebP, or GIF images into a single PDF.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div id="file-list-area"></div>
            <div class="options-panel" id="options" style="display:none;">
                <h3>Page Size</h3>
                <div class="option-row"><label class="option-label">Page size</label>
                    <select id="page-size">
                        <option value="fit">Fit to image</option>
                        <option value="a4">A4</option>
                        <option value="letter">Letter</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Create PDF</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PDF Created</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let files = [];
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            const fileListArea = document.getElementById('file-list-area');
            function renderList() {
                createFileList(fileListArea, files, {
                    removable: true, sortable: true,
                    onRemove: function (i) { files.splice(i, 1); renderList(); btnProcess.disabled = files.length === 0; document.getElementById('options').style.display = files.length ? 'block' : 'none'; },
                    onReorder: function (from, to) { const item = files.splice(from, 1)[0]; files.splice(to, 0, item); renderList(); }
                });
            }
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.jpg,.jpeg,.png,.webp,.gif', multiple: true,
                onFiles: function (nf) { files.push(...nf); renderList(); document.getElementById('options').style.display = 'block'; btnProcess.disabled = false; }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(5, 'Creating PDF...');
                    const doc = await PDFLib.PDFDocument.create();
                    const ps = document.getElementById('page-size').value;
                    for (let i = 0; i < files.length; i++) {
                        progress.update(5 + (i / files.length) * 90, 'Embedding image ' + (i + 1) + '...');
                        const bytes = new Uint8Array(await files[i].arrayBuffer());
                        const ext = files[i].name.split('.').pop().toLowerCase();
                        let img;
                        try { img = ext === 'jpg' || ext === 'jpeg' ? await doc.embedJpg(bytes) : await doc.embedPng(bytes); } catch (e) { continue; }
                        const dims = img.scale(1);
                        let pw = dims.width, ph = dims.height;
                        if (ps === 'a4') { pw = 595.28; ph = 841.89; } else if (ps === 'letter') { pw = 612; ph = 792; }
                        const page = doc.addPage([pw, ph]);
                        const sc = Math.min(pw / dims.width, ph / dims.height);
                        page.drawImage(img, { x: (pw - dims.width * sc) / 2, y: (ph - dims.height * sc) / 2, width: dims.width * sc, height: dims.height * sc });
                    }
                    progress.update(98, 'Saving...'); const blob = await savePDF(doc); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = files.length + ' images → ' + doc.getPageCount() + ' pages • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'images.pdf', da);
                    showToast('PDF created!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
