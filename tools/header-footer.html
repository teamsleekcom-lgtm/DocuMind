<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header &amp; Footer — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Enrich</span><span class="breadcrumb-sep">›</span><span>Header
                &amp; Footer</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="7" x2="21" y2="7" />
                    <line x1="3" y1="17" x2="21" y2="17" />
                </svg></div>
            <div>
                <h1>Header &amp; Footer</h1>
                <p>Add custom text headers and footers to every page.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div class="options-panel" id="options" style="display:none;">
                <h3>Header</h3>
                <div class="option-row"><label class="option-label">Left</label><input type="text" id="h-left"
                        placeholder="Header left"></div>
                <div class="option-row"><label class="option-label">Center</label><input type="text" id="h-center"
                        placeholder="Header center"></div>
                <div class="option-row"><label class="option-label">Right</label><input type="text" id="h-right"
                        placeholder="Header right"></div>
                <h3 style="margin-top:1rem;">Footer</h3>
                <div class="option-row"><label class="option-label">Left</label><input type="text" id="f-left"
                        placeholder="Footer left"></div>
                <div class="option-row"><label class="option-label">Center</label><input type="text" id="f-center"
                        placeholder="Footer center"></div>
                <div class="option-row"><label class="option-label">Right</label><input type="text" id="f-right"
                        placeholder="Footer right"></div>
                <div class="slider-row" style="margin-top:1rem;"><label class="option-label">Font Size</label><input
                        type="range" id="hf-size" min="6" max="16" value="9"><span class="slider-value"
                        id="hf-size-val">9px</span></div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Add Header &amp; Footer</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>Done</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf-lib.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            const sizeSlider = document.getElementById('hf-size');
            sizeSlider.addEventListener('input', function () { document.getElementById('hf-size-val').textContent = sizeSlider.value + 'px'; });
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: function (files) { if (files.length) { currentFile = files[0]; document.getElementById('options').style.display = 'block'; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(20, 'Adding header/footer...');
                    const doc = await loadPDF(currentFile);
                    const pages = doc.getPages();
                    const font = await doc.embedFont(PDFLib.StandardFonts.Helvetica);
                    const fs = parseInt(sizeSlider.value);
                    const vals = {
                        hL: document.getElementById('h-left').value, hC: document.getElementById('h-center').value, hR: document.getElementById('h-right').value,
                        fL: document.getElementById('f-left').value, fC: document.getElementById('f-center').value, fR: document.getElementById('f-right').value
                    };
                    pages.forEach(function (page) {
                        const { width, height } = page.getSize();
                        const draw = function (text, x, y) {
                            if (text) page.drawText(text, { x, y, size: fs, font, color: PDFLib.rgb(0.3, 0.3, 0.3) });
                        };
                        draw(vals.hL, 28, height - 24);
                        if (vals.hC) draw(vals.hC, (width - font.widthOfTextAtSize(vals.hC, fs)) / 2, height - 24);
                        if (vals.hR) draw(vals.hR, width - font.widthOfTextAtSize(vals.hR, fs) - 28, height - 24);
                        draw(vals.fL, 28, 14);
                        if (vals.fC) draw(vals.fC, (width - font.widthOfTextAtSize(vals.fC, fs)) / 2, 14);
                        if (vals.fR) draw(vals.fR, width - font.widthOfTextAtSize(vals.fR, fs) - 28, 14);
                    });
                    progress.update(80, 'Saving...'); const blob = await savePDF(doc); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = pages.length + ' pages updated • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, 'header-footer.pdf', da);
                    showToast('Header & footer added!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
