<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PPTX — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>PDF to
                PPTX</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" />
                    <line x1="8" y1="21" x2="16" y2="21" />
                    <line x1="12" y1="17" x2="12" y2="21" />
                </svg></div>
            <div>
                <h1>PDF to PPTX</h1>
                <p>Convert each PDF page to an image slide in a PPTX file.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <button class="btn btn-primary" id="btn-process" disabled>Convert to PPTX</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PPTX Ready</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf.min.js"></script>
    <script src="../libs/jszip.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            pdfjsLib.GlobalWorkerOptions.workerSrc = '../libs/pdf.worker.min.js';
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: function (files) { if (files.length) { currentFile = files[0]; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(5, 'Rendering pages...');
                    const data = new Uint8Array(await currentFile.arrayBuffer());
                    const pdf = await pdfjsLib.getDocument({ data }).promise;
                    const zip = new JSZip();
                    const W = 9144000, H = 5143500; // EMU for 10in x 7.5in
                    const slideImages = [];
                    for (let i = 1; i <= pdf.numPages; i++) {
                        progress.update(5 + (i / pdf.numPages) * 75, 'Rendering page ' + i + '...');
                        const page = await pdf.getPage(i);
                        const vp = page.getViewport({ scale: 1.5 });
                        const canvas = document.createElement('canvas');
                        canvas.width = vp.width; canvas.height = vp.height;
                        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                        const imgData = canvas.toDataURL('image/jpeg', 0.88).split(',')[1];
                        slideImages.push(imgData);
                    }
                    progress.update(82, 'Building PPTX...');
                    const rels = (id, type, target) => `<Relationship Id="${id}" Type="${type}" Target="${target}"/>`;
                    const imgType = 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image';
                    zip.file('[Content_Types].xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="jpeg" ContentType="image/jpeg"/>
<Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>
${slideImages.map((_, i) => `<Override PartName="/ppt/slides/slide${i + 1}.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>`).join('\n')}
</Types>`);
                    zip.file('_rels/.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${rels('rId1', 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument', 'ppt/presentation.xml')}</Relationships>`);
                    const sldIdLst = slideImages.map((_, i) => `<p:sldId id="${256 + i}" r:id="rId${i + 1}"/>`).join('');
                    const pptRels = slideImages.map((_, i) => rels(`rId${i + 1}`, 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide', `slides/slide${i + 1}.xml`)).join('');
                    zip.file('ppt/presentation.xml', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:sldMasterIdLst/><p:sldIdLst>${sldIdLst}</p:sldIdLst><p:sldSz cx="${W}" cy="${H}"/></p:presentation>`);
                    zip.file('ppt/_rels/presentation.xml.rels', `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${pptRels}</Relationships>`);
                    slideImages.forEach(function (imgData, i) {
                        zip.file(`ppt/media/image${i + 1}.jpeg`, imgData, { base64: true });
                        zip.file(`ppt/slides/slide${i + 1}.xml`, `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:sld xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><p:cSld><p:spTree><p:sp><p:nvSpPr><p:cNvPr id="1" name="bg"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${W}" cy="${H}"/></a:xfrm></p:spPr></p:sp><p:pic><p:nvPicPr><p:cNvPr id="2" name="img${i + 1}"/><p:cNvPicPr/><p:nvPr/></p:nvPicPr><p:blipFill><a:blip r:embed="rId1"/><a:stretch><a:fillRect/></a:stretch></p:blipFill><p:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${W}" cy="${H}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr></p:pic></p:spTree></p:cSld></p:sld>`);
                        zip.file(`ppt/slides/_rels/slide${i + 1}.xml.rels`, `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${rels('rId1', imgType, `../media/image${i + 1}.jpeg`)}</Relationships>`);
                    });
                    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
                    progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = pdf.numPages + ' slides • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, currentFile.name.replace('.pdf', '.pptx'), da);
                    showToast('PPTX created!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
