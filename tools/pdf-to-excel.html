<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>PDF to
                Excel</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                </svg></div>
            <div>
                <h1>PDF to Excel</h1>
                <p>Extract structured text and detected tables to XLSX format.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <button class="btn btn-primary" id="btn-process" disabled>Extract to Excel</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>XLSX Ready</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/pdf.min.js"></script>
    <script src="../libs/xlsx.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/pdf-engine.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null;
            const btnProcess = document.getElementById('btn-process');
            const progress = createProgressBar(document.getElementById('progress-area'));
            pdfjsLib.GlobalWorkerOptions.workerSrc = '../libs/pdf.worker.min.js';
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.pdf', multiple: false,
                onFiles: function (files) { if (files.length) { currentFile = files[0]; btnProcess.disabled = false; } }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(10, 'Extracting...');
                    const data = new Uint8Array(await currentFile.arrayBuffer());
                    const pdf = await pdfjsLib.getDocument({ data }).promise;
                    const wb = XLSX.utils.book_new();
                    for (let i = 1; i <= pdf.numPages; i++) {
                        progress.update(10 + (i / pdf.numPages) * 80, 'Processing page ' + i + '...');
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const rows = {};
                        content.items.forEach(function (item) {
                            const rowKey = Math.round(item.transform[5] / 5) * 5;
                            if (!rows[rowKey]) rows[rowKey] = [];
                            rows[rowKey].push({ text: item.str, x: item.transform[4] });
                        });
                        const data2d = Object.keys(rows).sort(function (a, b) { return b - a; }).map(function (key) {
                            return rows[key].sort(function (a, b) { return a.x - b.x; }).map(function (c) { return c.text; });
                        });
                        const ws = XLSX.utils.aoa_to_sheet(data2d);
                        XLSX.utils.book_append_sheet(wb, ws, 'Page ' + i);
                    }
                    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = pdf.numPages + ' sheets created • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, currentFile.name.replace('.pdf', '.xlsx'), da);
                    showToast('XLSX created!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
