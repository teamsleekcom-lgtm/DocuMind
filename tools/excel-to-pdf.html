<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel to PDF — DocuMind</title>
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/tools.css">
</head>

<body>
    <nav class="nav"><a href="../index.html" class="nav-logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
            </svg>DocuMind</a>
        <div class="nav-links"><a href="https://github.com" class="nav-link" target="_blank">GitHub</a></div>
    </nav>
    <div class="tool-page">
        <div class="breadcrumb"><a href="../index.html">Home</a><span
                class="breadcrumb-sep">›</span><span>Convert</span><span class="breadcrumb-sep">›</span><span>Excel to
                PDF</span></div>
        <div class="tool-header">
            <div class="tool-header-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <line x1="3" y1="9" x2="21" y2="9" />
                    <line x1="3" y1="15" x2="21" y2="15" />
                    <line x1="9" y1="3" x2="9" y2="21" />
                    <line x1="15" y1="3" x2="15" y2="21" />
                </svg></div>
            <div>
                <h1>Excel to PDF</h1>
                <p>Convert spreadsheets to PDF format.</p>
            </div>
        </div>
        <div class="tool-main">
            <div id="dropzone-area"></div>
            <div id="sheet-selector" class="options-panel" style="display:none;">
                <h3>Sheet Selection</h3>
                <div class="option-row"><label class="option-label">Sheet</label><select id="sheet-select"></select>
                </div>
            </div>
            <button class="btn btn-primary" id="btn-process" disabled>Convert to PDF</button>
            <div id="progress-area"></div>
            <div class="results" id="results-area">
                <div class="results-summary">
                    <div class="results-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12" />
                        </svg></div>
                    <div class="results-text">
                        <h3>PDF Ready</h3>
                        <p id="results-info"></p>
                    </div>
                </div>
                <div id="download-area"></div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container">
            <p>All processing happens in your browser. Your files never leave your device.</p>
        </div>
    </footer>
    <script src="../libs/xlsx.min.js"></script>
    <script src="../libs/jspdf.min.js"></script>
    <script src="../core/utils.js"></script>
    <script src="../core/ui-components.js"></script>
    <script>
        (function () {
            let currentFile = null, workbook = null;
            const btnProcess = document.getElementById('btn-process');
            const sheetSelect = document.getElementById('sheet-select');
            const progress = createProgressBar(document.getElementById('progress-area'));
            createDropzone({
                container: document.getElementById('dropzone-area'), accept: '.xlsx,.xls,.csv', multiple: false, label: 'Accepts .xlsx, .xls, .csv',
                onFiles: async function (files) {
                    if (!files.length) return;
                    currentFile = files[0];
                    const data = await currentFile.arrayBuffer();
                    workbook = XLSX.read(data);
                    const sel = document.getElementById('sheet-select');
                    sel.innerHTML = workbook.SheetNames.map(function (n) { return '<option>' + n + '</option>'; }).join('');
                    document.getElementById('sheet-selector').style.display = 'block';
                    btnProcess.disabled = false;
                }
            });
            btnProcess.addEventListener('click', async function () {
                try {
                    btnProcess.disabled = true; progress.show(); progress.update(20, 'Converting...');
                    const sheetName = sheetSelect.value;
                    const sheet = workbook.Sheets[sheetName];
                    const html = '<style>table{border-collapse:collapse;font-size:10px;}td,th{border:1px solid #ccc;padding:4px;}</style>' + XLSX.utils.sheet_to_html(sheet);
                    progress.update(50, 'Rendering PDF...');
                    const { jsPDF } = jspdf;
                    const doc = new jsPDF({ format: 'a4', orientation: 'landscape', unit: 'mm' });
                    const tmp = document.createElement('div');
                    tmp.innerHTML = html;
                    tmp.style.cssText = 'position:fixed;left:-9999px;top:0;width:280mm;font-family:sans-serif;';
                    document.body.appendChild(tmp);
                    await doc.html(tmp, { x: 5, y: 5, html2canvas: { scale: 1.2 } });
                    document.body.removeChild(tmp);
                    const blob = doc.output('blob'); progress.update(100, 'Done!');
                    document.getElementById('results-info').textContent = sheetName + ' • ' + formatFileSize(blob.size);
                    document.getElementById('results-area').classList.add('active');
                    const da = document.getElementById('download-area'); da.innerHTML = '';
                    createDownloadButton(blob, currentFile.name.replace(/\.\w+$/, '.pdf'), da);
                    showToast('PDF created!', 'success');
                } catch (e) { showToast('Error: ' + e.message, 'error'); }
                finally { progress.hide(); btnProcess.disabled = false; }
            });
        })();
    </script>
</body>

</html>
